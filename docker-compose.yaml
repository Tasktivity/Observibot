services:
  observibot:
    build: .
    image: observibot:dev
    container_name: observibot
    env_file:
      - .env
    environment:
      OBSERVIBOT_CONFIG: /app/config/observibot.yaml
    volumes:
      - observibot-data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  observibot-data:
